<!DOCTYPE html>
<html lang="pt-br">
<meta name="robots" content="noindex">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background: #fdfaf6;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #login-container {
            text-align: center;
            padding: 2rem;
            border: 1px solid #e0d8cc;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-weight: normal;
            color: #8e735b;
        }

        input {
            padding: 12px;
            border: 1px solid #d1c7bc;
            border-radius: 4px;
            width: 200px;
            margin-bottom: 1rem;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: #8e735b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #765f4a;
        }

        #invite-content {
            display: none;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .error {
            color: #b22222;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

    <div id="login-container">
        <h1>N & C</h1>
        <p>Por favor, insira a senha para acessar o convite:</p>

        <form onsubmit="unlock(event)">
            <input type="password" id="password" placeholder="Senha">
            <br>
            <button type="submit">Entrar</button>
        </form>

        <div id="error-msg" class="error">Senha incorreta. Tente novamente.</div>
    </div>

        async function unlock(e) {
            if (e) e.preventDefault();

            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const decrypted = await decrypt(encryptedData, password);

                // Remove o login e limpa o body
                document.getElementById('login-container').remove();

                // Reset agressivo do Body para não interferir no convite
                document.body.style.display = 'block';
                document.body.style.height = 'auto';
                document.body.style.width = '100%';
                document.body.style.margin = '0';
                document.body.style.textAlign = 'initial'; // Reseta alinhamentos de texto

                const container = document.getElementById('invite-content');
                container.style.display = 'block';
                container.innerHTML = decrypted;

            } catch (e) {
                errorMsg.style.display = 'block';
            }
        }

        // --- Core da Web Crypto API ---
        async function decrypt(data, password) {
            const encoder = new TextEncoder();
            const decoder = new TextDecoder();

            // 1. Importa a senha como material de chave
            const keyMaterial = await crypto.subtle.importKey(
                "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
            );

            // 2. Deriva a chave AES real usando o salt
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: base64ToArray(data.salt), iterations: 100000, hash: "SHA-256" },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false, ["decrypt"]
            );

            // 3. Descriptografa
            const decryptedContent = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: base64ToArray(data.iv) },
                key,
                base64ToArray(data.ciphertext)
            );

            return decoder.decode(decryptedContent);
        }

        function base64ToArray(base64) {
            return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        }
